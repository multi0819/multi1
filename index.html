<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json?v=20260514-001-cache-reset">
<link rel="icon" href="./icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<title>여행기록</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --ink:#0a0a0f;--ink2:#1c1c2e;--ink3:#2d2d44;
  --muted:#6b7280;--faint:#9ca3af;
  --surface:#ffffff;--surface2:#fafafa;--surface3:#f5f5f7;
  --border:#e5e5ea;--border2:#d1d5db;
  --gold:#b8860b;--gold2:#d4a017;--gold3:#f0c040;
  --blue:#1a56db;--blue2:#2563eb;--blue3:#3b82f6;
  --red:#dc2626;
  --serif:'Noto Serif KR',Georgia,serif;
  --sans:'Noto Sans KR',-apple-system,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;background:#f0f0f5;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
button,input,textarea,select{font:inherit}
button{border:0;background:none;color:inherit;cursor:pointer}
input,textarea,select{border:0;outline:0;background:transparent;width:100%}
.app{max-width:430px;min-height:100dvh;margin:0 auto;background:var(--surface2);position:relative;box-shadow:0 0 60px rgba(0,0,0,.15)}

/* ── TOP BAR ── */
.top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:8px 20px 0;position:sticky;top:0;background:rgba(250,250,250,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:20;border-bottom:1px solid rgba(229,229,234,.6)}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(145deg,#0a0a0f,#1c1c2e);display:grid;place-items:center;color:white;font-size:18px;box-shadow:0 8px 24px rgba(10,10,15,.28),inset 0 1px 0 rgba(255,255,255,.08)}
.brand-name{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:.5px;color:var(--ink)}
.badge{padding:6px 12px;border-radius:999px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#15803d;font-size:11px;font-weight:700;border:1px solid #bbf7d0;letter-spacing:.3px}

/* ── PAGE ── */
.page{height:calc(100dvh - 64px - 72px);overflow-y:auto;padding:20px 18px 108px;-webkit-overflow-scrolling:touch}
.page::-webkit-scrollbar{display:none}

/* ── BOTTOM NAV ── */
.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100%);height:72px;background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(229,229,234,.8);display:grid;grid-template-columns:1fr 1fr 68px 1fr 1fr;align-items:center;padding:0 10px env(safe-area-inset-bottom);z-index:30;box-shadow:0 -1px 0 rgba(0,0,0,.06)}
.nav{font-size:10px;font-weight:600;color:var(--faint);display:flex;flex-direction:column;gap:4px;align-items:center;letter-spacing:.5px;transition:color .2s}
.nav-ico{font-size:20px;line-height:1}
.nav.on{color:var(--ink)}
.add{width:56px;height:56px;border-radius:20px;background:linear-gradient(145deg,#0a0a0f,#1c1c2e);color:white;font-size:28px;font-weight:300;box-shadow:0 16px 40px rgba(10,10,15,.35),0 4px 12px rgba(10,10,15,.2);margin-top:-26px;transition:transform .15s,box-shadow .15s;display:grid;place-items:center}
.add:active{transform:scale(.94);box-shadow:0 8px 20px rgba(10,10,15,.3)}

/* ── HERO (COVER) ── */
.hero{height:380px;border-radius:28px;overflow:hidden;position:relative;background:var(--ink);box-shadow:0 32px 80px rgba(10,10,15,.3)}
.hero img{width:100%;height:100%;object-fit:cover;filter:saturate(1.12) contrast(1.06);transition:transform .6s}
.hero:hover img{transform:scale(1.02)}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,15,.02) 0%,rgba(10,10,15,.08) 30%,rgba(10,10,15,.72) 85%,rgba(10,10,15,.88) 100%)}
.heroTxt{position:absolute;left:22px;right:22px;bottom:26px;color:white;z-index:1}
.hero-eyebrow{display:inline-flex;gap:8px;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(12px);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;color:rgba(255,255,255,.9)}
.heroTxt h1{margin:0 0 14px;font-family:var(--serif);font-size:32px;line-height:1.15;letter-spacing:-.5px;font-weight:700;text-shadow:0 4px 24px rgba(0,0,0,.3)}
.hero-sub{display:inline-flex;gap:8px;align-items:center;padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(12px);font-size:12px;font-weight:500;letter-spacing:.3px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px 12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.stat b{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--ink);display:block}
.stat span{color:var(--muted);font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;display:block;margin-top:4px}

/* ── SEARCH & TABS ── */
.search{height:50px;background:var(--surface);border:1px solid var(--border);border-radius:18px;display:flex;align-items:center;gap:10px;padding:0 14px;margin:18px 0 14px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.search-ico{font-size:16px;color:var(--muted)}
.search input::placeholder{color:var(--faint);font-size:14px}
.tabs{display:flex;gap:7px;overflow:auto;margin-bottom:14px;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:9px 15px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.3px;transition:all .18s}
.tab.on{background:var(--ink);color:white;border-color:var(--ink);box-shadow:0 8px 20px rgba(10,10,15,.2)}

/* ── CARDS ── */
.list{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:14px;display:grid;grid-template-columns:96px 1fr;gap:14px;box-shadow:0 2px 16px rgba(0,0,0,.07);transition:box-shadow .2s,transform .2s}
.card:active{transform:scale(.99);box-shadow:0 1px 8px rgba(0,0,0,.06)}
.card img{width:96px;height:96px;border-radius:18px;object-fit:cover;background:var(--surface3)}
.card h3{margin:2px 0 5px;font-family:var(--serif);font-size:16px;line-height:1.3;letter-spacing:-.2px;color:var(--ink);font-weight:600}
.meta{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.note{font-size:12px;color:var(--muted);line-height:1.6;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.summary{font-size:11px;color:var(--ink3);font-weight:600;line-height:1.5;margin-top:7px;letter-spacing:.2px}
.acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.mini{padding:6px 11px;border-radius:10px;background:var(--surface3);color:var(--ink3);font-size:11px;font-weight:600;border:1px solid var(--border);letter-spacing:.2px;transition:background .15s}
.mini:active{background:var(--border)}
.bad{background:#fff1f2;color:var(--red);border-color:#fecdd3}
.empty{padding:32px 20px;border-radius:20px;background:var(--surface);border:1px dashed var(--border2);color:var(--muted);text-align:center;line-height:1.8;font-size:14px}

/* ── DETAIL COVER ── */
.cover{height:290px;margin:-20px -18px 0;position:relative;overflow:hidden;background:var(--ink)}
.cover img{width:100%;height:100%;object-fit:cover;filter:saturate(1.1)}
.cover::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,15,.05) 0%,rgba(10,10,15,.75) 100%)}
.back{position:absolute;top:20px;left:18px;z-index:2;width:40px;height:40px;border-radius:15px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);color:white;font-size:22px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.2)}
.ct{position:absolute;left:22px;right:22px;bottom:22px;z-index:2;color:white}
.ct h1{font-family:var(--serif);font-size:26px;letter-spacing:-.4px;margin:0 0 8px;font-weight:700;text-shadow:0 2px 16px rgba(0,0,0,.3)}
.sheet{margin:-24px -2px 0;position:relative;z-index:4;background:var(--surface2);border-radius:28px 28px 0 0;padding:18px 0 0}
.subtabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:5px;margin-bottom:16px}
.subtabs button{padding:10px 4px;border-radius:13px;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.3px;transition:all .18s}
.subtabs button.on{background:var(--ink);color:white}
.dayrow{display:flex;gap:7px;overflow:auto;margin-bottom:14px}
.dayrow::-webkit-scrollbar{display:none}
.day{min-width:70px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:9px 8px;font-size:12px;font-weight:600;color:var(--muted);text-align:center;letter-spacing:.3px}
.day.on{background:var(--ink);color:white;border-color:var(--ink)}
.entry{display:grid;grid-template-columns:52px 1fr;gap:10px;margin-bottom:14px}
.time{font-size:12px;font-weight:600;color:var(--muted);padding-top:5px;letter-spacing:.3px}
.ebox{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ebox h3{margin:0 0 7px;font-family:var(--serif);font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-.2px}
.ebox p{margin:0;color:var(--muted);line-height:1.7;font-size:13px}
.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.photos img{width:100%;height:76px;border-radius:12px;object-fit:cover}
.biggrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.biggrid img{height:155px;width:100%;border-radius:18px;object-fit:cover;background:var(--surface3)}

/* ── MAP ── */
.mapbox{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:0 2px 16px rgba(0,0,0,.07)}
#realMap{width:100%;height:390px;border-radius:20px;border:1px solid var(--border);overflow:hidden;background:var(--surface3);z-index:1}
.mapFallback{height:390px;border-radius:20px;border:1px dashed var(--border2);display:grid;place-items:center;text-align:center;color:var(--muted);line-height:1.7;padding:20px;background:var(--surface3)}
.mapPopup{min-width:190px}.mapPopup b{font-family:var(--serif);font-size:15px}.mapPopup p{margin:4px 0;color:#6b7280;font-size:12px}.mapPopup button{margin-top:8px;padding:7px 10px;border-radius:10px;background:#0a0a0f;color:white;font-size:12px;font-weight:700}
.rating-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.rating-card h3{margin:0 0 6px;font-family:var(--serif);font-size:16px}.rating-card p{margin:6px 0 0;color:var(--muted);line-height:1.65;font-size:13px}
.maphead{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;align-items:flex-start}
.maphead h3{margin:0;font-family:var(--serif);font-size:17px;font-weight:700;letter-spacing:-.3px}
.maphead p{margin:5px 0 0;color:var(--muted);font-size:12px;font-weight:400}
.regions{display:none}
.region{padding:9px 5px;border-radius:12px;background:var(--surface3);color:var(--muted);font-size:11px;font-weight:600;border:1px solid var(--border);letter-spacing:.3px;transition:all .18s}
.region.has{background:var(--ink);color:white;border-color:var(--ink)}
.kpath{fill:#f3f4f6;stroke:#d1d5db;stroke-width:1.2}
svg text{font-family:var(--sans)}

/* ── FORM ── */
.field{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.field label{display:block;color:var(--muted);font-size:11px;font-weight:600;margin-bottom:7px;letter-spacing:.8px;text-transform:uppercase}
.field input,.field select,.field textarea{font-size:15px;color:var(--ink);font-weight:400}
.field input::placeholder,.field textarea::placeholder{color:var(--faint)}
.field textarea{min-height:78px;resize:vertical;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── BUTTONS ── */
.primary{height:52px;border-radius:16px;background:var(--ink);color:white;font-weight:700;font-size:15px;width:100%;box-shadow:0 12px 32px rgba(10,10,15,.24);letter-spacing:.3px;transition:opacity .15s,transform .15s}
.primary:active{opacity:.88;transform:scale(.99)}
.secondary{height:48px;border-radius:14px;background:var(--surface);border:1px solid var(--border);font-weight:600;color:var(--ink3);width:100%;font-size:14px;transition:background .15s}
.secondary:active{background:var(--surface3)}
.danger{height:48px;border-radius:14px;background:#fff1f2;color:var(--red);font-weight:700;width:100%;border:1px solid #fecdd3;font-size:14px}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(10,10,15,.5);z-index:80;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal.show{display:flex}
.panel{width:min(430px,100%);max-height:88dvh;overflow:auto;background:var(--surface2);border-radius:28px 28px 0 0;padding:20px 18px calc(24px + env(safe-area-inset-bottom))}
.panel::-webkit-scrollbar{display:none}
.panelhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.panelhead h2{margin:0;font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.3px}
.close{width:36px;height:36px;border-radius:13px;background:var(--surface3);border:1px solid var(--border);font-size:18px;display:grid;place-items:center;color:var(--muted)}
.preview{height:140px;border-radius:18px;background:var(--surface3);border:1px dashed var(--border2);display:grid;place-items:center;overflow:hidden;color:var(--muted);font-size:13px;font-weight:500}
.preview img{width:100%;height:100%;object-fit:cover}

/* ── STATUS / RATING / PHOTO STRIP ── */
.statusbar{position:fixed;left:50%;top:72px;transform:translateX(-50%);width:min(390px,calc(100% - 32px));z-index:70;margin:0;padding:10px 12px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12px;font-weight:700;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.08);display:none}
.statusbar.show{display:block}
.entry-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.entry-acts{display:flex;gap:5px;flex-shrink:0}
.entry-acts .mini{padding:5px 8px;font-size:10px}
.stars{color:#d4a017;font-size:13px;letter-spacing:1px;margin:2px 0 6px;font-weight:700}
.rating-select{display:flex;gap:7px;flex-wrap:wrap}
.rating-select button{width:36px;height:34px;border-radius:12px;background:var(--surface3);border:1px solid var(--border);font-size:15px;color:#d4a017;font-weight:800}
.rating-select button.on{background:#fffbeb;border-color:#f0c040;box-shadow:0 0 0 2px rgba(240,192,64,.18) inset}
.photoStrip{display:flex;gap:8px;overflow-x:auto;padding:4px 0 2px}
.photoStrip::-webkit-scrollbar{display:none}
.photoChip{position:relative;flex:0 0 94px;height:74px;border-radius:14px;overflow:hidden;background:var(--surface3);border:1px solid var(--border)}
.photoChip img{width:100%;height:100%;object-fit:cover}
.photoChip button{position:absolute;right:5px;top:5px;width:24px;height:24px;border-radius:50%;background:rgba(10,10,15,.76);color:white;font-size:15px;line-height:1}
.tour-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.tour-item{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px 13px;font-size:13px;line-height:1.55;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.tour-item b{display:block;font-family:var(--serif);font-size:15px;margin-bottom:3px;color:var(--ink)}

/* ── TOAST ── */
.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(20px);width:min(360px,calc(100% - 32px));background:var(--ink);color:rgba(255,255,255,.92);border-radius:16px;padding:13px 16px;box-shadow:0 20px 48px rgba(10,10,15,.3);z-index:100;opacity:0;transition:.24s;font-size:13px;font-weight:500;text-align:center;letter-spacing:.2px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SECTION LABELS ── */
.sec-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px}

/* ── INFO BOX ── */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.5px}
.info-val{font-size:14px;color:var(--ink);font-weight:500}
</style>

</head>
<body>
<div class="app">

<header class="top">
  <div class="brand">
    <div class="logo">✈</div>
    <span class="brand-name" id="headTitle">여행기록</span>
  </div>
  <div class="badge" id="dbBadge">저장됨</div>
</header>

<main class="page" id="page"></main>
<div class="statusbar" id="statusbar"></div>

<nav class="bottom">
  <button class="nav" data-v="cover"><span class="nav-ico">⌂</span>홈</button>
  <button class="nav" data-v="home"><span class="nav-ico">▦</span>목록</button>
  <button class="add" id="plus">+</button>
  <button class="nav" data-v="map"><span class="nav-ico">⌖</span>지도</button>
  <button class="nav" data-v="setting"><span class="nav-ico">☻</span>관리</button>
</nav>
</div>

<div class="toast" id="toast"></div>
<input id="backupImportFile" type="file" accept="application/json,.json" style="display:none">

<!-- TRIP MODAL -->
<div class="modal" id="tripModal">
  <div class="panel">
    <div class="panelhead">
      <h2 id="tripModalTitle">새 여행 기록</h2>
      <button class="close" onclick="closeM('tripModal')">×</button>
    </div>
    <form id="tripForm">
      <input type="hidden" id="tripId">
      <div class="field"><label>여행 제목</label><input id="tripTitle" required placeholder="예: 제주도 봄 여행"></div>
      <div class="row2">
        <div class="field"><label>구분</label><select id="tripCountry"><option>국내</option><option>해외</option></select></div>
        <div class="field"><label>지역</label><select id="tripRegion"></select></div>
      </div>
      <div class="field"><label>시·군·구</label><input id="tripCity" placeholder="예: 서귀포시, 강릉시, 종로구"></div>
      <div class="row2">
        <div class="field"><label>시작일</label><input id="tripStart" type="date" required></div>
        <div class="field"><label>종료일</label><input id="tripEnd" type="date" required></div>
      </div>
      <div class="field"><label>여행 노트</label><textarea id="tripNote" placeholder="이 여행에 대한 짧은 소감을 남겨보세요"></textarea></div>
      <div class="field"><label>대표 사진</label><input id="tripPhoto" type="file" accept="image/*"><div class="preview" id="tripPreview">사진을 선택하세요</div></div>
      <button class="primary">저장하기</button>
    </form>
  </div>
</div>

<!-- ENTRY MODAL -->
<div class="modal" id="entryModal">
  <div class="panel">
    <div class="panelhead">
      <h2 id="entryModalTitle">기록 추가</h2>
      <button class="close" onclick="closeM('entryModal')">×</button>
    </div>
    <form id="entryForm">
      <input type="hidden" id="entryId">
      <div class="row2">
        <div class="field"><label>일차</label><input id="entryDay" type="number" min="1" value="1"></div>
        <div class="field"><label>시간</label><input id="entryTime" type="time"></div>
      </div>
      <div class="field"><label>유형</label>
        <select id="entryType">
          <option value="place">📍 장소</option>
          <option value="food">🍽 음식</option>

function tripText(t){return [t.city,t.title,t.country,t.region,t.note,...(t.entries||[]).flatMap(e=>[e.title,e.body,e.type])].filter(Boolean).join(' ');}
function cleanPlaceName(v){return String(v||'').trim().replace(/\s+/g,' ');}
function locationKeyOf(t){
  const raw=cleanPlaceName(t.city);
  if(cityCenters[raw]) return raw;
  if(raw&&cityCenters[raw+'시']) return raw+'시';
  if(raw&&cityCenters[raw+'군']) return raw+'군';
  if(raw&&cityCenters[raw+'구']) return raw+'구';
  if(raw&&cityAliases[raw]) return cityAliases[raw];
  const text=tripText(t);
  for(const [alias,key] of Object.entries(cityAliases)){if(text.includes(alias)) return key;}
  const keys=Object.keys(cityCenters).sort((a,b)=>b.length-a.length);
  for(const key of keys){if(text.includes(key)||text.includes(key.replace(/[시군구]$/,''))) return key;}
  return '';
}
function coordOf(t){
  if(Array.isArray(t.coord)&&t.coord.length===2) return [Number(t.coord[0]),Number(t.coord[1])];
  if(Number.isFinite(Number(t.lat))&&Number.isFinite(Number(t.lng))) return [Number(t.lat),Number(t.lng)];
  const key=locationKeyOf(t);
  if(key&&cityCenters[key]) return cityCenters[key];
  return t.country==='해외'?null:(regionCenters[t.region]||regionCenters.서울);
}
function locationLabelOf(t){
  if(Array.isArray(t.coord)||Number.isFinite(Number(t.lat))) return '저장된 위도/경도 기준';
  const key=locationKeyOf(t);
  if(key) return `${key} 행정청 기준`;
  return t.country==='해외'?'좌표 미확인':'도/광역시 대표좌표 기준';
}
function geocodeQueryOf(t){
  const key=locationKeyOf(t)||cleanPlaceName(t.city)||cleanPlaceName(t.title);
  if(!key) return '';
  if(t.country==='해외') return `${key} city hall`;
  return `${key}청 대한민국`;
}
async function geocodeTrip(t){
  const cached=localStorage.getItem('geo:'+t.id+':'+(t.updatedAt||''));
  if(cached){try{return JSON.parse(cached)}catch(e){}}
  const q=geocodeQueryOf(t); if(!q) return null;
  try{
    const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=ko&q='+encodeURIComponent(q);
    const r=await fetch(url,{headers:{'Accept':'application/json'}});
    if(!r.ok) return null;
    const arr=await r.json();
    if(!arr||!arr[0]) return null;
    const c=[Number(arr[0].lat),Number(arr[0].lon)];
    if(Number.isFinite(c[0])&&Number.isFinite(c[1])){localStorage.setItem('geo:'+t.id+':'+(t.updatedAt||''),JSON.stringify(c));return c;}
  }catch(e){}
  return null;
}

function openDb(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(NEW_DB,1);
    r.onerror=()=>rej(r.error);
    r.onupgradeneeded=()=>{
      const db=r.result;
      if(!db.objectStoreNames.contains(STORE)){
        const s=db.createObjectStore(STORE,{keyPath:'id'});
        s.createIndex('region','region',{unique:false});
        s.createIndex('updatedAt','updatedAt',{unique:false});
      }
    };
    r.onsuccess=()=>res(r.result);
  });
}
async function all(){
  const db=await openDb();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readonly');
    const rq=tx.objectStore(STORE).getAll();
    rq.onsuccess=()=>res(rq.result||[]);
    rq.onerror=()=>rej(rq.error);
  });
}
async function put(t){
  const db=await openDb();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const rq=tx.objectStore(STORE).put({...t,updatedAt:new Date().toISOString()});
    rq.onsuccess=()=>res(rq.result);
    rq.onerror=()=>rej(rq.error);
  });
}
async function del(id){
  const db=await openDb();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const rq=tx.objectStore(STORE).delete(id);
    rq.onsuccess=()=>res();
    rq.onerror=()=>rej(rq.error);
  });
}
async function clearDb(){
  const db=await openDb();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const rq=tx.objectStore(STORE).clear();
    rq.onsuccess=()=>res();
    rq.onerror=()=>rej(rq.error);
  });
}

async function initRealMap(target=''){
  const el=document.getElementById('realMap');if(!el)return;
  const rows=st.trips.filter(t=>target==='해외'?t.country==='해외':(target&&target!=='전체'&&target!=='국내'&&target!=='북마크'?t.country==='국내'&&t.region===target:t.country==='국내'));
  if(!window.L){el.outerHTML='<div class="mapFallback">실제 지도 소스를 불러오지 못했습니다.<br>인터넷 연결 후 다시 열면 지도에 방문기록이 표시됩니다.</div>';return;}
  const center=target==='해외'?[20,0]:(target&&regionCenters[target]?regionCenters[target]:[36.4,127.9]);
  const zoom=target==='해외'?2:(target&&regionCenters[target]?8:6);
  const m=L.map(el,{zoomControl:true,attributionControl:true}).setView(center,zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap'}).addTo(m);
  const bounds=[];
  for(const t of rows){
    let c=coordOf(t);
    if(!c) c=await geocodeTrip(t);
    if(!c) continue;
    bounds.push(c);
    const entryCount=t.entries?.length||0;
    const avg=entryCount?((t.entries||[]).reduce((a,e)=>a+Number(e.rating||0),0)/entryCount).toFixed(1):'없음';
    const popup=`<div class="mapPopup"><b>${esc(t.title)}</b><p>${esc(t.region)} ${esc(t.city||'')} · ${entryCount}개 기록 · 평균별점 ${avg}</p><p>표시 기준: ${esc(locationLabelOf(t))}</p><button onclick="openDetail('${t.id}')">여행기록 보기</button></div>`;
    L.marker(c).addTo(m).bindPopup(popup);
  }
  if(bounds.length){m.fitBounds(bounds,{padding:[32,32],maxZoom:target==='해외'?6:11});}
}

async function bookmark(x){
  const t=st.trips.find(a=>a.id===x);
  await put({...t,bookmarked:!t.bookmarked});
  toast(t.bookmarked?'북마크 해제':'북마크 저장');
  await reload(false);
}
async function deleteTrip(x){
  if(confirm('이 여행 기록을 삭제할까요?')){
    await del(x);toast('삭제되었습니다');await reload(false);
    if(st.v==='detail'){st.v='home';render();}else{render();}
  }
}
async function f2d(f){
  return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f)});
}
function normalizeTrip(raw){
  const now=new Date().toISOString();
  const country=raw.country||(raw.region==='해외'?'해외':'국내');
  const region=raw.region||(country==='해외'?'해외':'서울');
  return {id:raw.id||uid(),title:raw.title||raw.name||raw.tripTitle||'복원 여행',country,region,city:raw.city||raw.sigungu||raw.cityName||'',startDate:raw.startDate||raw.start||new Date().toISOString().slice(0,10),endDate:raw.endDate||raw.end||raw.startDate||new Date().toISOString().slice(0,10),note:raw.note||raw.memo||raw.description||'',cover:raw.cover||raw.photo||raw.image||cover,bookmarked:!!raw.bookmarked,entries:(raw.entries||raw.records||[]).map(e=>({id:e.id||uid(),day:Number(e.day||1),time:e.time||'',type:e.type||'memo',title:e.title||e.name||'기록',body:e.body||e.note||e.memo||e.content||'',rating:Number(e.rating||0),photos:e.photos||e.images||[]})),createdAt:raw.createdAt||now,updatedAt:raw.updatedAt||now};
}
function extractTrips(data){if(Array.isArray(data))return data;if(data?.trips)return data.trips;if(data?.data)return data.data;if(data?.records)return data.records;return []}
function readJsonFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{try{res(JSON.parse(r.result))}catch(e){rej(e)}};r.onerror=()=>rej(r.error);r.readAsText(file,'utf-8')})}
async function importBackupFile(file){
  try{
    const rows=extractTrips(await readJsonFile(file));
    if(!rows.length){toast('복원할 데이터가 없습니다');return}
    const existing=new Map((await all()).map(t=>[String(t.id),t]));
    let add=0,upd=0;
    for(const raw of rows){
      const t=normalizeTrip(raw);
      if(existing.has(String(t.id))){await put({...existing.get(String(t.id)),...t,id:t.id});upd++}
      else{await put(t);add++}
    }
    await reload(false);st.v='home';render();
    toast(`복원 완료 — 신규 ${add}건, 갱신 ${upd}건`);
  }catch(e){console.error(e);toast('JSON 복원 실패')}
}
function exportData(){
  const b=new Blob([JSON.stringify(st.trips,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='travel-record-backup.json';
  a.click();URL.revokeObjectURL(a.href);
  toast('백업 파일이 저장되었습니다');
}
async function resetOnlyNew(){
  if(confirm('모든 여행 데이터를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.')){
    await clearDb();st.trips=[];st.sel=null;st.v='cover';render();toast('초기화 완료');
  }
}

document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>{st.v=b.dataset.v;render()});
document.getElementById('plus').onclick=()=>{if(st.v==='detail'){resetEntryForm();statusMsg(`${st.day}일차 세부일정을 입력합니다`,1200);openM('entryModal')}else newTrip()};
tripCountry.onchange=e=>fillRegion(e.target.value,e.target.value==='국내'?'서울':'해외');
tripPhoto.onchange=async e=>{const f=e.target.files[0];if(f){const d=await f2d(f);tripPreview.innerHTML=`<img src="${d}">`;tripPreview.dataset.src=d}};
entryPhotos.onchange=async e=>{const cur=JSON.parse(entryPreview.dataset.src||'[]');const ds=await Promise.all([...e.target.files].map(f2d));setEntryPhotos([...cur,...ds]);statusMsg(`${ds.length}장의 사진이 선택되었습니다`,1200)};
tripForm.onsubmit=async e=>{
  e.preventDefault();
  const old=st.trips.find(t=>t.id===tripId.value);
  const t={id:tripId.value||uid(),title:tripTitle.value,country:tripCountry.value,region:tripRegion.value,startDate:tripStart.value,endDate:tripEnd.value,note:tripNote.value,city:tripCity.value.trim(),cover:tripPreview.dataset.src||old?.cover||cover,bookmarked:old?.bookmarked||false,entries:old?.entries||[],createdAt:old?.createdAt||new Date().toISOString()};
  await put(t);st.sel=t.id;closeM('tripModal');await reload(false);st.v='detail';render();toast('여행이 저장되었습니다');
};
entryForm.onsubmit=async e=>{
  e.preventDefault();
  const t=sel();if(!t){toast('여행을 먼저 선택하세요');return}
  statusMsg('세부일정을 저장하는 중입니다...',0);
  const en={id:entryId.value||uid(),day:+entryDay.value||1,time:entryTime.value||nowTime(),type:entryType.value,title:entryTitle.value,body:entryBody.value,rating:+entryRating.value||0,photos:JSON.parse(entryPreview.dataset.src||'[]')};
  const entries=[...(t.entries||[])];
  const ix=entries.findIndex(a=>a.id===en.id);
  if(ix>=0)entries[ix]=en;else entries.push(en);
  await put({...t,entries});
  st.day=en.day;st.tab='일정';closeM('entryModal');
  resetEntryForm();
  await reload(false);st.v='detail';render();toast(ix>=0?'세부일정이 수정되었습니다':'세부일정이 추가되었습니다');statusMsg('세부일정 저장 완료',1200);
};
function editEntry(id){
  const t=sel();const e=(t?.entries||[]).find(a=>a.id===id);if(!e)return;
  entryId.value=e.id;entryDay.value=e.day||st.day;entryTime.value=e.time||nowTime();entryType.value=e.type||'memo';entryTitle.value=e.title||'';entryBody.value=e.body||'';
  entryModalTitle.textContent='기록 수정';entrySaveBtn.textContent='수정 저장';drawRatingBtns(e.rating||0);setEntryPhotos(e.photos||[]);
  statusMsg('세부일정 수정 화면을 열었습니다',1200);openM('entryModal');
}
async function deleteEntry(id){
  const t=sel();if(!t)return;
  if(!confirm('이 세부일정을 삭제할까요?'))return;
  statusMsg('세부일정을 삭제하는 중입니다...',0);
  await put({...t,entries:(t.entries||[]).filter(e=>e.id!==id)});
  await reload(false);st.v='detail';render();toast('세부일정이 삭제되었습니다');statusMsg('세부일정 삭제 완료',1200);
}
backupImportFile.onchange=e=>{const f=e.target.files?.[0];if(f)importBackupFile(f);e.target.value=''};
drawRatingBtns(0);
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js?v=20260514-003-world-cityhall', { updateViaCache: 'none' })
      .then(reg=>{
        reg.update && reg.update();
        if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
        reg.addEventListener('updatefound',()=>{
          const nw=reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed' && navigator.serviceWorker.controller) location.reload();
          });
        });
      })
      .catch(()=>{});
  });
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!window.__swReloaded){ window.__swReloaded=true; location.reload(); }
  });
}
boot();
</script>
